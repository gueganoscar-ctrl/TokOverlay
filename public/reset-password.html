<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokOverlay - Nouveau mot de passe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body.app-bg { padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card-box { width: 100%; max-width: 420px; padding: 35px; background: #14131b; border: 1px solid #29283a; border-radius: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { text-transform: uppercase; font-size: 11px; font-weight: 700; color: var(--text-lo); }
    input { padding: 12px; background: var(--ink); border: 1px solid var(--border); color: white; border-radius: 10px; font-size: 14px; }
    input:focus { border-color: var(--cyan); outline: none; }
  </style>
</head>
<body class="app-bg">
  <div class="card-box card">
    <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 22px;">Nouveau mot de passe</h2>
    <form id="form-reset" onsubmit="reinitialiserMotDePasse(event)">
      <div class="form-group">
        <label>Choisis ton nouveau mot de passe</label>
        <input type="password" id="new-password" required placeholder="Min. 6 caractères">
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top: 10px; width: 100%; padding: 12px;">Mettre à jour</button>
    </form>
    <div id="message" style="font-size: 13px; text-align: center; line-height: 1.4;"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');

    if (!token || !email) {
      document.getElementById('message').style.color = 'var(--danger)';
      document.getElementById('message').textContent = "Lien de réinitialisation invalide ou incomplet.";
      document.getElementById('form-reset').style.display = 'none';
    }

    async function reinitialiserMotDePasse(e) {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const msgDiv = document.getElementById('message');

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword })
        });
        const data = await res.json();

        if (data.success) {
          msgDiv.style.color = 'var(--success)';
          msgDiv.textContent = "Mot de passe modifié avec succès ! Redirection vers la connexion...";
          setTimeout(() => { window.location.href = '/'; }, 2500);
        } else {
          msgDiv.style.color = 'var(--danger)';
          msgDiv.textContent = data.error || "Une erreur est survenue.";
        }
      } catch {
        msgDiv.style.color = 'var(--danger)';
        msgDiv.textContent = "Erreur de connexion au serveur.";
      }
    }
  </script>
</body>
</html>
