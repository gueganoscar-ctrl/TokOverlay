<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TokOverlay - Donateurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@600;700&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root { --cyan: #22e5e0; --fuchsia: #fe2c55; --gold: #ffbe3d; --bg-dark: #100f14; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Inter', sans-serif; color: #ffffff; background: transparent;
      display: flex; flex-direction: column; align-items: flex-start; gap: 16px; padding: 10px; width: fit-content; height: fit-content;
    }
    #leaderboard { display: flex; flex-direction: column; gap: 10px; width: 260px; }
    #leaderboard h3 { margin: 0 0 4px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 800; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8); }
    .carte-joueur { display: flex; align-items: center; position: relative; background: rgba(16, 15, 20, 0.85); border: 1px solid rgba(34, 229, 224, 0.3); border-radius: 10px; padding: 6px 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); }
    .rank-1.carte-joueur { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 190, 61, 0.25); }
    .avatar-container { position: relative; margin-right: 12px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.2); object-fit: cover; background: #1e1e24; }
    .rank-1 .avatar { border-color: var(--gold); }
    .crown { position: absolute; top: -12px; left: -6px; font-size: 16px; display: none; }
    .rank-1 .crown { display: block; }
    .info { display: flex; flex-direction: column; }
    .nickname { font-size: 13px; font-weight: 700; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9); }
    .valeur { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 800; color: var(--cyan); text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9); }
  </style>
</head>
<body>

  <div id="leaderboard">
    <h3 id="titre-classement">Top Donateurs</h3>
    <p class="message-attente" id="message-attente-simple">Connexion au live...</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const pathParts = window.location.pathname.split('/');
    const pseudo = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
    const params = new URLSearchParams(window.location.search);
    const isDemo = params.get('demo') === '1';

    function creerCarteJoueur(user, rank, cle, emoji) {
      const carte = document.createElement('div');
      carte.className = `carte-joueur rank-${rank}`;

      const avatarContainer = document.createElement('div');
      avatarContainer.className = 'avatar-container';
      const crown = document.createElement('span');
      crown.className = 'crown';
      crown.textContent = '👑';
      const img = document.createElement('img');
      img.className = 'avatar';
      img.src = user.profilePictureUrl;
      avatarContainer.append(crown, img);

      const info = document.createElement('div');
      info.className = 'info';
      const nickname = document.createElement('span');
      nickname.className = 'nickname';
      nickname.textContent = user.nickname;
      const valeur = document.createElement('span');
      valeur.className = 'valeur';
      valeur.textContent = `${emoji}${user[cle].toLocaleString()}`;
      info.append(nickname, valeur);

      carte.append(avatarContainer, info);
      return carte;
    }

    const socket = io();

    socket.on('connect', () => {
      if (pseudo && !isDemo) {
        socket.emit('rejoindre', { pseudo, type: 'donateurs' });
      }
    });

    const leaderboard = document.getElementById('leaderboard');
    const messageAttente = document.getElementById('message-attente-simple');

    function afficherClassementSimple(top3, cle, emoji) {
      if(messageAttente) messageAttente.remove();
      leaderboard.querySelectorAll('.carte-joueur').forEach(el => el.remove());
      top3.forEach((user, i) => leaderboard.appendChild(creerCarteJoueur(user, i + 1, cle, emoji)));
    }

    socket.on('updateTopGifters', top3 => afficherClassementSimple(top3, 'coins', '💎 '));
    socket.on('erreurConnexion', msg => { if(messageAttente) { messageAttente.textContent = msg; }});

    if (isDemo) {
      const nomsDemo = ['Alex_Live', 'Mia.Star', 'TokFan92'];
      function genererFauxTop3() {
        const top3 = nomsDemo.map((nom, i) => ({
          nickname: nom,
          profilePictureUrl: `https://ui-avatars.com/api/?name=${encodeURIComponent(nom)}&background=random`,
          coins: Math.floor(Math.random() * 3000) + (3 - i) * 1500
        })).sort((a, b) => b.coins - a.coins);
        afficherClassementSimple(top3, 'coins', '💎 ');
      }
      genererFauxTop3();
      setInterval(genererFauxTop3, 4000);
    }
  </script>
</body>
</html>
