<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokOverlay - Statistiques & Historique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body.app-bg { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; }
    .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 24px; }

    .header-card { padding: 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    p.subtitle { color: var(--text-lo); font-size: 13px; margin: 4px 0 0; }

    .historique-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .historique-grid { grid-template-columns: 1fr; } }
    .historique-card { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .historique-card h2 { font-size: 14px; }
    .historique-liste { display: flex; flex-direction: column; gap: 8px; }
    .historique-item {
      background: var(--ink); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-size: 12px; display: flex; flex-direction: column; gap: 3px;
    }
    .historique-item .ligne-haut { display: flex; justify-content: space-between; font-weight: 700; color: var(--text-hi); }
    .historique-item .ligne-bas { color: var(--text-faint); font-size: 11px; }
    .historique-vide { color: var(--text-faint); font-size: 12px; text-align: center; padding: 10px 0; }
  </style>
</head>
<body class="app-bg">
  <div class="container">
    <div class="header-card card">
      <div class="header-left">
        <div>
          <h1>Statistiques & Historique</h1>
          <p class="subtitle" id="user-info">Chargement des données...</p>
        </div>
      </div>
      <a href="/choix.html" class="btn btn-secondary">← Retour au dashboard</a>
    </div>

    <div class="historique-grid">
      <div class="historique-card card">
        <h2>📅 Historique des lives passés</h2>
        <div class="historique-liste" id="historique-lives">
          <div class="historique-vide">Chargement...</div>
        </div>
      </div>
      <div class="historique-card card">
        <h2>⚖️ Historique des enchères passées</h2>
        <div class="historique-liste" id="historique-encheres">
          <div class="historique-vide">Chargement...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let pseudoGlobal = '';

    fetch('/api/me')
      .then(res => res.json())
      .then(user => {
        if (!user || !user.pseudo) {
          window.location.href = '/';
          return;
        }
        pseudoGlobal = user.pseudo;
        document.getElementById('user-info').textContent = `Statistiques détaillées pour @${pseudoGlobal}`;
        chargerHistorique(pseudoGlobal);
      })
      .catch(() => {
        window.location.href = '/';
      });

    function formaterDate(dateStr) {
      return new Date(dateStr).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    // Fonction sécurisée anti-XSS sans innerHTML
    function chargerHistorique(pseudo) {
      fetch('/api/historique/' + encodeURIComponent(pseudo))
        .then(res => res.json())
        .then(({ lives, encheres }) => {
          const conteneurLives = document.getElementById('historique-lives');
          conteneurLives.innerHTML = '';
          if (!lives || lives.length === 0) {
            const divVide = document.createElement('div');
            divVide.className = 'historique-vide';
            divVide.textContent = 'Aucun live enregistré pour le moment.';
            conteneurLives.appendChild(divVide);
          } else {
            lives.forEach(live => {
              const item = document.createElement('div');
              item.className = 'historique-item';

              const ligneHaut = document.createElement('div');
              ligneHaut.className = 'ligne-haut';
              const spanStats = document.createElement('span');
              spanStats.textContent = `💎 ${(live.totalDiamants || 0).toLocaleString()} · ❤️ ${(live.totalLikes || 0).toLocaleString()}`;
              const spanDate = document.createElement('span');
              spanDate.textContent = formaterDate(live.fin);
              ligneHaut.append(spanStats, spanDate);

              const ligneBas = document.createElement('div');
              ligneBas.className = 'ligne-bas';
              ligneBas.textContent = live.topDonateur ? `Top donateur : ${live.topDonateur.nickname} (${live.topDonateur.coins.toLocaleString()} 💎)` : 'Aucun don reçu';

              item.append(ligneHaut, ligneBas);
              conteneurLives.appendChild(item);
            });
          }

          const conteneurEncheres = document.getElementById('historique-encheres');
          conteneurEncheres.innerHTML = '';
          if (!encheres || encheres.length === 0) {
            const divVide = document.createElement('div');
            divVide.className = 'historique-vide';
            divVide.textContent = 'Aucune enchère enregistrée pour le moment.';
            conteneurEncheres.appendChild(divVide);
          } else {
            encheres.forEach(e => {
              const item = document.createElement('div');
              item.className = 'historique-item';

              const ligneHaut = document.createElement('div');
              ligneHaut.className = 'ligne-haut';
              const spanGagnant = document.createElement('span');
              spanGagnant.textContent = e.gagnant ? `🏆 ${e.gagnant.nickname}` : 'Aucun gagnant';
              const spanDate = document.createElement('span');
              spanDate.textContent = formaterDate(e.date);
              ligneHaut.append(spanGagnant, spanDate);

              const ligneBas = document.createElement('div');
              ligneBas.className = 'ligne-bas';
              ligneBas.textContent = `${e.gagnant ? e.gagnant.coins.toLocaleString() + ' 💎' : ''} · Total enchère : ${(e.totalDiamantsEnchere || 0).toLocaleString()} 💎`.trim();

              item.append(ligneHaut, ligneBas);
              conteneurEncheres.appendChild(item);
            });
          }
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
